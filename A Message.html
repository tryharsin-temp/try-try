<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Dialogue</title>
    <!-- 8-Bit Pixel Font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .game-screen {
            position: relative;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .dialogue-box {
            background-color: #ffffff;
            border: 6px double #000000;
            padding: 25px 20px;
            min-height: 110px;
            position: relative;
            box-sizing: border-box;
            width: 100%;
        }

        .corner-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #000000;
            border: 2px solid #ffffff;
        }
        .tl { top: -5px; left: -5px; }
        .tr { top: -5px; right: -5px; }
        .bl { bottom: -5px; left: -5px; }
        .br { bottom: -5px; right: -5px; }

        h2 {
            color: #000000;
            font-size: 14px;
            line-height: 1.8;
            margin: 0;
            text-transform: uppercase;
        }

        .options-menu {
            position: absolute;
            right: 20px;
            bottom: 125px;
            background-color: #ffffff;
            border: 6px double #000000;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 105px;
            z-index: 10;
        }

        .btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: #000000;
            background: none;
            border: none;
            text-align: left;
            cursor: pointer;
            padding: 2px 0 2px 20px;
            position: relative;
            text-transform: uppercase;
        }

        .btn:hover::before {
            content: "▶";
            position: absolute;
            left: 0;
            top: 2px;
            font-size: 12px;
        }

        .blink-arrow {
            display: inline-block;
            font-size: 12px;
            margin-left: 8px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="game-screen">
        
        <!-- Yes/No Action Menu Window -->
        <div class="options-menu" id="button-container">
            <button class="btn" onclick="handleYes()">YES</button>
            <button class="btn" id="btn-no" onclick="handleNo()">NO</button>
        </div>

        <!-- Compact Dialogue Box Text Frame -->
        <div class="dialogue-box">
            <div class="corner-dot tl"></div>
            <div class="corner-dot tr"></div>
            <div class="corner-dot bl"></div>
            <div class="corner-dot br"></div>
            
            <h2 id="message-text">I miss you!!! Do you miss me?<span class="blink-arrow">▼</span></h2>
        </div>

    </div>

    <script>
        const noMessages = [
            "Are you sure?",
            "Choosing takes time, think longer.",
            "Are you sure you don't miss me?",
            "what!!!",
            "I need to cry la TvT",
            "Last chance!!!!"
        ];
        
        // NEW: Split the "Yes" phase into two distinct messages
        const firstYesMessage = "Yeah! I knew it! Miss you mak mak tooo!  (Click Yes) <span class='blink-arrow'>▼</span>";
        const finalYesMessage = "Momo na, Thank you to be in my life na. Be Happy and Healthy together na =) ";

        let noClickCount = 0;
        let yesClickCount = 0; // Tracks how many times "YES" has been clicked
        
        const messageElement = document.getElementById("message-text");
        const buttonContainer = document.getElementById("button-container");
        const noButton = document.getElementById("btn-no");

        function handleNo() {
            if (noClickCount < noMessages.length) {
                messageElement.innerHTML = noMessages[noClickCount];
                noClickCount++;
            }
            
            if (noClickCount === 6) {
                noButton.style.display = "none";
            }
        }

        // UPDATED: Handles multiple steps for the "YES" button
        function handleYes() {
            if (yesClickCount === 0) {
                // First click on YES: Show the intermediate message and hide the NO button
                messageElement.innerHTML = firstYesMessage;
                noButton.style.display = "none"; 
                yesClickCount++;
            } else if (yesClickCount === 1) {
                // Second click on YES: Show the absolute final message and hide all menus
                messageElement.innerHTML = finalYesMessage;
                buttonContainer.style.display = "none"; 
            }
        }
    </script>

</body>
</html>
